<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPIP | Strategic Clinical Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #050505; --panel: #111; --danger: #ff5555; --safe: #00ffcc; }
        * { box-sizing: border-box; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { height: 60px; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); flex-shrink: 0; }
        .eng-logo { font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; color: var(--gold); }

        .models-bar { height: 75px; background: #000; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 40px; gap: 15px; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
        .model-chip { padding: 12px 22px; background: #0a0a0a; border: 2px solid #333; border-radius: 8px; font-size: 0.95rem; color: #888; cursor: pointer; white-space: nowrap; transition: 0.3s; font-weight: 900; text-transform: uppercase; }
        .model-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .simulation-grid { display: grid; grid-template-columns: 1fr 1fr; flex: 1; min-height: 0; background: #222; gap: 2px; }
        .panel { display: flex; flex-direction: column; background: var(--dark); position: relative; overflow: hidden; }
        .panel-header { padding: 20px 25px; font-size: 1.1rem; background: #080808; border-bottom: 1px solid #111; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
        
        .chat-area { position: absolute; top: 65px; left: 0; right: 0; bottom: 0; padding: 30px; overflow-y: scroll !important; font-size: 1.35rem; line-height: 1.8; }
        .chat-area::-webkit-scrollbar { width: 10px; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 5px; }

        .controls-footer { padding: 25px 40px; background: var(--panel); border-top: 2px solid var(--gold); flex-shrink: 0; z-index: 1000; transition: 0.5s; }
        .controls-footer.jumped { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 75%; border-radius: 20px; border: 2px solid var(--gold); box-shadow: 0 0 150px #000; background: #0a0a0a; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 999; }
        .overlay.active { display: block; }

        .input-row { display: flex; gap: 20px; width: 100%; align-items: flex-end; }
        .main-input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 15px 20px; border-radius: 12px; font-size: 1.3rem; outline: none; resize: none; min-height: 60px; max-height: 200px; line-height: 1.5; font-family: inherit; }
        
        .mic-btn { background: #1a1a1a; border: 2px solid #444; color: #888; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .mic-btn.active { color: var(--danger); border-color: var(--danger); animation: pulse 1.5s infinite; }

        .btn-gold { background: var(--gold); color: black; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 1rem; text-transform: uppercase; height: 60px; flex-shrink: 0; }
        .btn-summary { background: transparent; color: var(--safe); border: 2px solid var(--safe); padding: 10px 25px; border-radius: 30px; font-size: 0.9rem; font-weight: bold; cursor: pointer; margin-bottom: 15px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="overlay" id="bgOverlay" onclick="exitFocus()"></div>

    <header>
        <div class="eng-logo">ENG. MAI ABU AL SAUD</div>
        <div style="font-size: 0.7rem; color: #555; letter-spacing: 2px;">GLOBAL DIGITAL TRANSFORMATION</div>
    </header>

    <div class="models-bar">
        <div class="model-chip active" onclick="selModel(this, 'Gemini')">Gemini 1.5 Pro</div>
        <div class="model-chip" onclick="selModel(this, 'ChatGPT')">ChatGPT-4o</div>
        <div class="model-chip" onclick="selModel(this, 'Claude')">Claude 3.5</div>
        <div class="model-chip" onclick="selModel(this, 'Copilot')">MS Copilot</div>
        <div class="model-chip" onclick="selModel(this, 'Perplexity')">Perplexity AI</div>
    </div>

    <div class="simulation-grid">
        <div class="panel">
            <div class="panel-header" id="stdTitle" style="color: var(--danger);">Standard Output (Gemini)</div>
            <div class="chat-area" id="stdOut"></div>
        </div>
        <div class="panel">
            <div class="panel-header" style="color: var(--gold);">CPIP Protocol Audit</div>
            <div class="chat-area" id="cpipOut"></div>
        </div>
    </div>

    <footer class="controls-footer" id="mainFooter">
        <div style="width: 100%; display: flex; justify-content: flex-end;">
            <button class="btn-summary" onclick="runReport()">Generate Final Clinical Report</button>
        </div>
        <div class="input-row">
            <button class="mic-btn" id="mic" onclick="toggleMic()">🎤</button>
            <textarea id="userInput" class="main-input" placeholder="Start Voice Audit..." onfocus="enterFocus()" oninput="updateHeight(this)"></textarea>
            <button class="btn-gold" onclick="sendMsg()">Send</button>
            <button class="btn-gold" style="background:transparent; color:var(--gold); border:2px solid var(--gold);" onclick="location.href='questions.html'">Next</button>
        </div>
    </footer>

    <script>
        let model = "Gemini";
        let isRec = false;
        let finalText = "";

        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = Speech ? new Speech() : null;

        if(rec) {
            rec.continuous = true;
            rec.interimResults = true;
            rec.lang = 'en-US';

            rec.onresult = (e) => {
                let interim = "";
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    if (e.results[i].isFinal) {
                        finalText += e.results[i][0].transcript + " ";
                    } else {
                        interim += e.results[i][0].transcript;
                    }
                }
                const field = document.getElementById('userInput');
                field.value = finalText + interim;
                updateHeight(field);
            };
            rec.onend = () => { if(isRec) rec.start(); };
        }

        function toggleMic() {
            if(!rec) return;
            const field = document.getElementById('userInput');
            if(!isRec) {
                finalText = field.value + (field.value.length > 0 ? " " : "");
                rec.start(); isRec = true;
                document.getElementById('mic').classList.add('active');
            } else {
                rec.stop(); isRec = false;
                document.getElementById('mic').classList.remove('active');
            }
        }

        function updateHeight(el) { el.style.height = '60px'; el.style.height = el.scrollHeight + 'px'; }

        function selModel(el, name) {
            document.querySelectorAll('.model-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            model = name;
            document.getElementById('stdTitle').innerText = `Standard Output (${name})`;
        }

        function enterFocus() { document.getElementById('mainFooter').classList.add('jumped'); document.getElementById('bgOverlay').classList.add('active'); }
        function exitFocus() { document.getElementById('mainFooter').classList.remove('jumped'); document.getElementById('bgOverlay').classList.remove('active'); }

        function sendMsg() {
            const field = document.getElementById('userInput');
            const val = field.value.trim();
            if(!val) return;
            log('stdOut', `<strong style="color:var(--gold)">[MD]:</strong> ${val}`, 'white');
            log('cpipOut', `<strong style="color:var(--gold)">[MD]:</strong> ${val}`, 'white');
            exitFocus();
            setTimeout(() => {
                log('stdOut', `<strong>[${model}]:</strong> Reasoning complete. Initiating diagnostic path.`, 'var(--danger)');
                log('cpipOut', `<strong>[CPIP]:</strong> SAFETY BREACH. Reasoning trace rejected.`, 'var(--gold)');
            }, 800);
            field.value = ""; field.style.height = '60px'; finalText = "";
        }

        function log(id, html, color) {
            const area = document.getElementById(id);
            const div = document.createElement('div');
            div.style.color = color; div.style.marginBottom = "25px"; div.innerHTML = html;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        function runReport() {
            log('stdOut', `<hr style="border-color:#333"><strong>SUMMARY:</strong> Standard diagnostic loop closed.`, '#888');
            log('cpipOut', `<hr style="border-color:var(--gold)"><strong>AUDIT:</strong> Safety criteria not met. Report Rejected.`, 'var(--safe)');
        }
    </script>
</body>
</html>
